services:
  chef-service:
    build: ./chef-service
    ports:
      - "3001:8000"
    env_file:
      - ./chef-service/.env
    restart: unless-stopped

  registration-service:
    build: ./registration-service
    ports:
      - "3002:8000"
    env_file:
      - ./registration-service/.env
    restart: unless-stopped

  feedback-service:
    build: ./feedback-service
    ports:
      - "3003:8000"
    env_file:
      - ./feedback-service/.env
    restart: unless-stopped