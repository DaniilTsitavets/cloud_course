trigger:
  branches:
    include:
      - main
  paths:
    include:
      - feedback-service/*

pool:
  name: Default

steps:
  - script: |
      sudo apt-get update -y
      sudo apt-get install -y python3 python3-pip python3-venv python3-full
    displayName: 'Install Python'

  - script: |
      python3 -m venv .venv
      .venv/bin/pip install --upgrade pip
      .venv/bin/pip install -r requirements.txt
      .venv/bin/pip install flake8 pytest httpx pytest-asyncio
    workingDirectory: feedback-service
    displayName: 'Install dependencies'

  - script: |
      .venv/bin/flake8 main.py --max-line-length=150 --exclude=__pycache__
    workingDirectory: feedback-service
    displayName: 'Static validation (flake8)'

  - script: |
      .venv/bin/pytest tests/ -v --tb=short
    workingDirectory: feedback-service
    displayName: 'Unit tests (pytest)'