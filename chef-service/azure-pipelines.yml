trigger:
  branches:
    include:
      - main
  paths:
    include:
      - chef-service/*

pool:
  name: Default

steps:
  - script: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install flake8 pytest httpx
    workingDirectory: chef-service
    displayName: 'Install dependencies'

  - script: |
      flake8 main.py --max-line-length=130 --exclude=__pycache__
    workingDirectory: chef-service
    displayName: 'Static validation (flake8)'

  - script: |
      pytest tests/ -v --tb=short
    workingDirectory: chef-service
    displayName: 'Unit tests (pytest)'