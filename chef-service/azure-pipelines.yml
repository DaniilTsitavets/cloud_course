trigger:
  branches:
    include:
      - main
  paths:
    include:
      - chef-service/*

pool:
  name: Default

steps:
  - script: |
      python3 -m venv --clear .venv
      .venv/bin/pip install --upgrade pip
      .venv/bin/pip install -r requirements.txt
      .venv/bin/pip install flake8 pytest httpx
    workingDirectory: chef-service
    displayName: 'Install Python dependencies'

  - script: |
      .venv/bin/flake8 main.py --max-line-length=150 --exclude=__pycache__
    workingDirectory: chef-service
    displayName: 'Static validation (flake8)'

  - script: |
      .venv/bin/pytest tests/ -v --tb=short
    workingDirectory: chef-service
    displayName: 'Unit tests (pytest)'