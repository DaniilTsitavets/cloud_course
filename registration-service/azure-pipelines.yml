trigger:
  branches:
    include:
      - main
  paths:
    include:
      - registration-service/*

pool:
  name: Default

variables:
  pythonVersion: '3.12'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: $(pythonVersion)
    displayName: 'Set up Python $(pythonVersion)'

  - script: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install flake8 pytest httpx
    workingDirectory: registration-service
    displayName: 'Install dependencies'

  - script: |
      flake8 main.py --max-line-length=130 --exclude=__pycache__
    workingDirectory: registration-service
    displayName: 'Static validation (flake8)'

  - script: |
      pytest tests/ -v --tb=short
    workingDirectory: registration-service
    displayName: 'Unit tests (pytest)'